# Cloudflare Tunnel — exposes mcp-observability via outbound tunnel.
# No port forwarding needed. TLS is handled by Cloudflare.
# Use with:
#   docker compose -f docker-compose.yml -f docker-compose.tunnel.yml up -d
#
# Get CLOUDFLARE_TUNNEL_TOKEN from:
#   Cloudflare Zero Trust → Networks → Tunnels → Create tunnel → Cloudflared

services:
  mcp-observability:
    ports: !reset []

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - mcp-observability
